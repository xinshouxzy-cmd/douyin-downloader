name: Build Android APK

# 推送到 main 分支时自动构建
on:
  push:
    branches: [main, master]
  # 支持手动触发
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 安装依赖
        working-directory: app
        run: npm install

      - name: 构建 Web 应用
        working-directory: app
        run: npm run build

      - name: 添加 Android 平台
        working-directory: app
        run: npx cap add android

      - name: 同步 Web 资源到 Android
        working-directory: app
        run: npx cap sync android

      - name: 添加文件存储权限到Android清单
        working-directory: app
        run: |
          python3 << 'PYEOF'
          import re
          content = open('android/app/src/main/AndroidManifest.xml').read()
          perms = '''    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />'''
          content = re.sub(r'(<manifest[^>]*>)', r'\1\n' + perms, content)
          open('android/app/src/main/AndroidManifest.xml', 'w').write(content)
          print('Permissions added to manifest')
          PYEOF

      - name: 生成图标资源
        working-directory: app
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/drawable
          npx @capacitor/assets generate --android --iconBackgroundColor '#FE2C55' --iconBackgroundColorDark '#FE2C55' || echo "icon generation skipped"

      - name: 设置 Gradle 可执行权限
        working-directory: app
        run: chmod +x android/gradlew

      - name: 构建 Debug APK
        working-directory: app/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ANDROID_HOME=$ANDROID_SDK_ROOT ./gradlew assembleDebug

      - name: 构建 Release APK (未签名)
        working-directory: app/android
        run: |
          ANDROID_HOME=$ANDROID_SDK_ROOT ./gradlew assembleRelease

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: douyin-downloader-apk
          path: |
            app/android/app/build/outputs/apk/debug/app-debug.apk
            app/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
